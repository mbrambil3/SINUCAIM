<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Sinucada Aim Helper</title>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --text: #e6edf3;
        --muted: #7d8590;
        --accent: #3fb950;
        --accent-hover: #2ea043;
        --border: #30363d;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 280px;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .wrap {
        padding: 16px;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 4px 0;
        letter-spacing: 0.2px;
      }
      .sub {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 14px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 10px;
      }
      .row label {
        font-size: 13px;
        font-weight: 600;
      }
      .toggle {
        position: relative;
        width: 40px;
        height: 22px;
      }
      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        inset: 0;
        background: #30363d;
        border-radius: 22px;
        transition: background 0.2s;
        cursor: pointer;
      }
      .slider::before {
        content: "";
        position: absolute;
        height: 16px;
        width: 16px;
        left: 3px;
        top: 3px;
        background: white;
        border-radius: 50%;
        transition: transform 0.2s;
      }
      .toggle input:checked + .slider {
        background: var(--accent);
      }
      .toggle input:checked + .slider::before {
        transform: translateX(18px);
      }
      .status {
        font-size: 11px;
        color: var(--muted);
        text-align: center;
        padding: 8px;
        border: 1px dashed var(--border);
        border-radius: 6px;
      }
      .status.ok { color: var(--accent); border-color: var(--accent); }
      .status.warn { color: #d29922; border-color: #d29922; }
      .hint {
        font-size: 11px;
        color: var(--muted);
        margin-top: 10px;
        line-height: 1.5;
      }
      .hint b { color: var(--text); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Sinucada Aim Helper</h1>
      <div class="sub">Ferramenta de estudo de geometria (ghost ball)</div>

      <div class="row">
        <label for="enable">Ativar mira</label>
        <label class="toggle">
          <input type="checkbox" id="enable" data-testid="enable-toggle" />
          <span class="slider"></span>
        </label>
      </div>

      <div id="status" class="status" data-testid="status-msg">Carregando...</div>

      <div class="hint">
        Abra uma partida em <b>sinucada.com</b>, ative o toggle e use o painel
        que aparece no canto da tela para calibrar a mesa e selecionar as bolas.
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
